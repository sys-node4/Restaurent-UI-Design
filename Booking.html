<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Gourmet Bistro - Book Your Seat</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ea2a33",
                        "seat-available": "#2d8a4e",
                        "seat-booked": "#9ca3af",
                        "seat-selected": "#f97316",
                        "background-light": "#fcf9f7",
                        "background-dark": "#211111",
                    },
                    fontFamily: {
                        "display": ["Work Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Work Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
            min-height: 100dvh;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .sticky-nav {
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(8px);
            background-color: rgba(252, 249, 247, 0.9);
        }
        .floor-plan-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }
        .seat {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-[#181111] font-display">
<nav class="sticky-nav border-b border-primary/10 px-4 py-3 flex items-center justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl">restaurant</span>
<h1 class="text-xl font-extrabold tracking-tight">Gourmet<span class="text-primary">Bistro</span></h1>
</div>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-gray-700">search</button>
<button class="material-symbols-outlined text-gray-700">shopping_bag</button>
</div>
</nav>
<div class="bg-background-light px-4 overflow-x-auto hide-scrollbar border-b border-gray-100">
<div class="flex gap-8 py-3 min-w-max">
<a class="text-gray-500 font-medium hover:text-primary transition-colors" href="#">Home</a>
<a class="text-gray-500 font-medium hover:text-primary transition-colors" href="#">Menu</a>
<a class="text-primary font-bold border-b-2 border-primary pb-1" href="#">Booking</a>
<a class="text-gray-500 font-medium hover:text-primary transition-colors" href="#">Contact</a>
</div>
</div>
<main class="max-w-md mx-auto px-4 py-6 pb-32">
<div class="flex items-center justify-center mb-8">
<div class="flex items-center gap-3">
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-sm font-bold shadow-md shadow-primary/20">1</div>
<span class="text-xs font-bold text-primary">Select Seat</span>
</div>
<div class="w-12 h-[2px] bg-gray-200 -mt-5"></div>
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-white border-2 border-gray-200 text-gray-400 flex items-center justify-center text-sm font-bold">2</div>
<span class="text-xs font-medium text-gray-400">User Info</span>
</div>
</div>
</div>
<div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 mb-8">
<div class="flex items-center justify-between mb-6">
<h2 class="text-lg font-bold">Floor Plan</h2>
<div class="flex gap-3">
<div class="flex items-center gap-1">
<div class="w-3 h-3 rounded-full bg-seat-available"></div>
<span class="text-[10px] text-gray-500 font-medium">Free</span>
</div>
<div class="flex items-center gap-1">
<div class="w-3 h-3 rounded-full bg-seat-booked"></div>
<span class="text-[10px] text-gray-500 font-medium">Taken</span>
</div>
</div>
</div>
<div class="relative bg-gray-50/50 rounded-xl p-6 border border-dashed border-gray-200">
<div class="w-full h-8 bg-gray-200 rounded-lg flex items-center justify-center mb-10">
<span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Kitchen Area</span>
</div>
<div class="floor-plan-grid">
<div class="seat bg-seat-booked text-white"><span class="material-symbols-outlined text-sm">person</span></div>
<div class="seat bg-seat-available text-white hover:ring-2 ring-primary ring-offset-2"><span class="text-xs font-bold">A1</span></div>
<div class="seat bg-seat-available text-white hover:ring-2 ring-primary ring-offset-2"><span class="text-xs font-bold">A2</span></div>
<div class="seat bg-seat-booked text-white"><span class="material-symbols-outlined text-sm">person</span></div>
<div class="seat bg-seat-available text-white hover:ring-2 ring-primary ring-offset-2"><span class="text-xs font-bold">A3</span></div>
<div class="col-span-5 h-4"></div>
<div class="seat bg-seat-available text-white hover:ring-2 ring-primary ring-offset-2"><span class="text-xs font-bold">B1</span></div>
<div class="seat bg-seat-selected text-white ring-4 ring-orange-200"><span class="text-xs font-bold">B2</span></div>
<div class="seat bg-seat-available text-white hover:ring-2 ring-primary ring-offset-2"><span class="text-xs font-bold">B3</span></div>
<div class="seat bg-seat-available text-white hover:ring-2 ring-primary ring-offset-2"><span class="text-xs font-bold">B4</span></div>
<div class="seat bg-seat-booked text-white"><span class="material-symbols-outlined text-sm">person</span></div>
<div class="seat bg-seat-booked text-white"><span class="material-symbols-outlined text-sm">person</span></div>
<div class="seat bg-seat-available text-white hover:ring-2 ring-primary ring-offset-2"><span class="text-xs font-bold">C1</span></div>
<div class="seat bg-seat-available text-white hover:ring-2 ring-primary ring-offset-2"><span class="text-xs font-bold">C2</span></div>
<div class="seat bg-seat-available text-white hover:ring-2 ring-primary ring-offset-2"><span class="text-xs font-bold">C3</span></div>
<div class="seat bg-seat-available text-white hover:ring-2 ring-primary ring-offset-2"><span class="text-xs font-bold">C4</span></div>
</div>
</div>
</div>
<div class="space-y-6">
<h3 class="text-lg font-bold">Booking Details</h3>
<form class="space-y-4">
<div>
<label class="block text-sm font-semibold text-gray-700 mb-1.5" for="name">Full Name</label>
<input class="w-full rounded-xl border-gray-200 focus:border-primary focus:ring-primary text-sm p-3" id="name" placeholder="John Doe" type="text"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div>
<label class="block text-sm font-semibold text-gray-700 mb-1.5" for="phone">Phone</label>
<input class="w-full rounded-xl border-gray-200 focus:border-primary focus:ring-primary text-sm p-3" id="phone" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
<div>
<label class="block text-sm font-semibold text-gray-700 mb-1.5" for="email">Email</label>
<input class="w-full rounded-xl border-gray-200 focus:border-primary focus:ring-primary text-sm p-3" id="email" placeholder="john@example.com" type="email"/>
</div>
</div>
<div>
<label class="block text-sm font-semibold text-gray-700 mb-1.5" for="requests">Special Requests</label>
<textarea class="w-full rounded-xl border-gray-200 focus:border-primary focus:ring-primary text-sm p-3" id="requests" placeholder="Dietary restrictions, anniversary, window seat, etc..." rows="3"></textarea>
</div>
</form>
</div>
</main>
<div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t border-gray-100 flex flex-col gap-3">
<div class="flex items-center justify-between px-2">
<div class="flex flex-col">
<span class="text-xs text-gray-500 font-medium">Selected Seat</span>
<span class="text-sm font-bold text-gray-900">Table B2 (4 persons)</span>
</div>
<div class="text-right">
<span class="text-xs text-gray-500 font-medium">Booking Fee</span>
<span class="text-sm font-bold text-primary">$15.00</span>
</div>
</div>
<button class="bg-primary text-white w-full py-4 rounded-xl font-bold text-lg shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
        Proceed to Payment
        <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
<div class="h-24"></div>

</body></html>
